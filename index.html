    <title>CheckIn App - Điểm danh sự kiện</title>
    <meta name="description" content="Ứng dụng điểm danh sự kiện đơn giản, nhanh chóng bằng QR code" />
    <script>
      // GitHub Pages SPA redirect handler
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
